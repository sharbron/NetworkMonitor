[server]
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
# Set cookie_secure = true if serving behind an HTTPS reverse proxy
cookie_secure = false
cookie_samesite = lax

[users]
allow_sign_up = false
default_theme = dark

[auth.anonymous]
# Set enabled = true to allow read-only access without login
enabled = false

[dashboards]
min_refresh_interval = 10s

[log]
mode = console
level = warn
