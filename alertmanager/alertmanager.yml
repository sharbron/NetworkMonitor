global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_SMARTHOST}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_AUTH_USERNAME}'
  smtp_auth_password: '${SMTP_AUTH_PASSWORD}'
  smtp_require_tls: true

# ── Routing ──────────────────────────────────────────────────────────────
route:
  receiver: 'default'
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts go immediately, repeat every hour
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 0s
      repeat_interval: 1h

    # Warning alerts are batched
    - match:
        severity: warning
      receiver: 'warnings'
      repeat_interval: 4h

# ── Inhibition rules ─────────────────────────────────────────────────────
# When a target is completely down (ProbeFailed), suppress secondary alerts
# for that same instance to avoid notification spam.
inhibit_rules:
  - source_match:
      alertname: 'ProbeFailed'
    target_match_re:
      alertname: 'HighPingLatency|SlowHTTPResponse|SlowDNSResolution|HTTPBadStatusCode'
    equal: ['instance']

# ── Receivers ────────────────────────────────────────────────────────────
receivers:

  # Default: alerts visible in Alertmanager UI only (no external notifications)
  - name: 'default'

  # Critical alerts via Slack + email
  - name: 'critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '${SLACK_CHANNEL}'
        send_resolved: true
        title: '[CRITICAL] {{ .CommonAnnotations.summary }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true

  # Warnings via Slack only
  - name: 'warnings'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '${SLACK_CHANNEL}'
        send_resolved: true
        title: '[WARNING] {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
